name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install && npm install wrangler

      - name: Set secrets
        run: |
          npx wrangler secret put SUPABASE_ANON_KEY --name noox-api --env production <<< '${{ secrets.SUPABASE_ANON_KEY }}'
          npx wrangler secret put MINIMAX_API_KEY --name noox-api --env production <<< '${{ secrets.MINIMAX_API_KEY }}'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
